<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4dffaf" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4dffaf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4dffaf" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4dffaf" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#090909"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#ffffff" fill-opacity="0.03"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Green glow orb — top right -->
  <ellipse cx="1020" cy="140" rx="320" ry="320" fill="url(#glow-green)"/>
