  <rect x="358" y="320" width="58" height="28" rx="14" fill="#4dffaf" fill-opacity="0.08" stroke="#4dffaf" stroke-opacity="0.25" stroke-width="1"/>
  <text x="387" y="339" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4dffaf" text-anchor="middle" font-weight="600">PHP</text>

